  <text x="256" y="370" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="140" text-anchor="middle" fill="#f0c040" letter-spacing="4">FC</text>
  <text x="256" y="430" font-family="Arial, sans-serif" font-weight="700"
