  <line x1="256" y1="90" x2="256" y2="155" stroke="#f0c040" stroke-width="4"/>
  <line x1="313" y1="118" x2="295" y2="180" stroke="#f0c040" stroke-width="4"/>
  <line x1="345" y1="185" x2="280" y2="225" stroke="#f0c040" stroke-width="4"/>
  <line x1="199" y1="118" x2="217" y2="180" stroke="#f0c040" stroke-width="4"/>
  <line x1="167" y1="185" x2="232" y2="225" stroke="#f0c040" stroke-width="4"/>
